name: i Killer Bot - Auto Post

on:
  push:
    branches: [ main ]
  schedule:
    # Gira ogni 10 minuti, 24 ore su 24
    - cron: '*/10 * * * *'
  workflow_dispatch: # Ti permette di avviarlo a mano per testare

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Accesso al codice
        uses: actions/checkout@v3

      - name: Configurazione Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Installazione dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Esecuzione Bot i Killer
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
